<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Student Login — ExamPortal</title>
  <meta name="description" content="Student login for ExamPortal. Take quizzes and track your results."/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="icon">🎓</div>
      <div><h1>ExamPortal</h1><span>Student Portal</span></div>
    </div>
    <h2>Student Login</h2>
    <p class="subtitle">Sign in to access your quizzes and results</p>

    <form id="loginForm">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="your@email.com" autocomplete="email" required/>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password" required/>
      </div>
      <div id="alert" class="alert"></div>
      <button type="submit" class="btn btn-primary" id="submitBtn">🔐 Sign In</button>
    </form>

    <div class="auth-footer">
      Don't have an account? <a href="/student-register.html">Register here</a><br/><br/>
      <a href="/admin-login.html">Admin Login →</a>
    </div>
  </div>

  <script>
    fetch('/api/auth/check-session').then(r=>r.json()).then(d=>{
      if(d.loggedIn && d.role==='student') location.href='/student-dashboard.html';
      if(d.loggedIn && d.role==='admin') location.href='/admin-dashboard.html';
    });

    document.getElementById('loginForm').addEventListener('submit', async e=>{
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const alertEl = document.getElementById('alert');
      btn.innerHTML='<div class="spinner"></div> Signing in...'; btn.disabled=true;
      alertEl.className='alert';

      const res = await fetch('/api/auth/student-login',{
        method:'POST', headers:{'Content-Type':'application/json'},
        body:JSON.stringify({email:document.getElementById('email').value, password:document.getElementById('password').value})
      });
      const d = await res.json();
      if(d.success){
        alertEl.className='alert alert-success show'; alertEl.textContent='✅ Welcome back! Redirecting...';
        setTimeout(()=>location.href='/student-dashboard.html', 800);
      } else {
        alertEl.className='alert alert-error show'; alertEl.textContent='❌ '+d.message;
        btn.innerHTML='🔐 Sign In'; btn.disabled=false;
      }
    });
  </script>
</body>
</html>
